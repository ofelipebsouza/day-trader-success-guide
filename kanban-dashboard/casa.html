<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindsun — Rotina Casa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0a0a0a; color: #d4d4d4; padding: 32px; }
        .container { max-width: 1400px; margin: 0 auto; }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .header h1 { font-size: 1.6rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
        .header h1 span { color: #555; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .last-updated { font-size: 0.8rem; color: #555; }
        .btn-refresh { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: #aaa; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; transition: all 0.3s; }
        .btn-refresh:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .nav-tab { padding: 10px 20px; border-radius: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); color: #777; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.3s; text-decoration: none; }
        .nav-tab:hover { background: rgba(255,255,255,0.06); color: #ccc; }
        .nav-tab.active { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.15); }

        .board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; align-items: start; }
        @media (max-width: 1100px) { .board { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 700px) { .board { grid-template-columns: 1fr; } }

        .column { background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 20px 16px; min-height: 120px; }
        .column[data-status="backlog"] { border-left: 3px solid #555; }
        .column[data-status="in-progress"] { border-left: 3px solid #888; }
        .column[data-status="pending"] { border-left: 3px solid #444; border-style: dashed; }
        .column[data-status="paused"] { border-left: 3px solid #333; }
        .column[data-status="done"] { border-left: 3px solid #666; }
        .column-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .column-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        .column-count { font-size: 0.75rem; color: #555; background: rgba(255,255,255,0.04); padding: 2px 10px; border-radius: 100px; font-weight: 600; }
        .card { padding: 12px 14px; border-radius: 10px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.04); background: rgba(255,255,255,0.02); font-size: 0.82rem; line-height: 1.5; color: #bbb; transition: all 0.25s ease; cursor: default; }
        .card:last-child { margin-bottom: 0; }
        .card:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); transform: translateX(3px); }
        .column[data-status="done"] .card { opacity: 0.5; text-decoration: line-through; color: #666; }
        .column[data-status="done"] .card:hover { opacity: 0.7; color: #999; }
        .empty-card { color: #333; font-size: 0.78rem; font-style: italic; text-align: center; padding: 16px 0; }

        .streak-box { margin-top: 32px; padding: 24px; border-radius: 16px; background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .streak-box h2 { font-size: 1.2rem; color: #fff; margin-bottom: 8px; }
        .streak-box .sub { font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MINDSUN<span>.</span> <span style="font-weight:400;color:#666;font-size:1rem">Rotina Casa</span></h1>
            <div class="header-right">
                <span class="last-updated" id="lastUpdated">—</span>
                <button class="btn-refresh" onclick="loadKanban()">🔄 Atualizar</button>
            </div>
        </div>

        <div class="nav-tabs">
            <a href="index.html" class="nav-tab">📊 Projetos</a>
            <a href="pessoal.html" class="nav-tab">🧑 Pessoal</a>
            <a href="casa.html" class="nav-tab active">🏠 Casa</a>
        </div>

        <div class="board" id="board"></div>
    </div>

    <script>
        const CASA_PATH = 'areas/Rotina Casa.md';
        const COLUMNS = [
            { key: 'backlog',   title: '📋 Backlog',     match: /^## 📋 Backlog/i },
            { key: 'in-progress', title: '🔄 In Progress', match: /^## 🔄 In Progress/i },
            { key: 'pending',   title: '⏸️ Pending',     match: /^## ⏸️ Pending/i },
            { key: 'paused',    title: '⏹️ Paused',      match: /^## ⏹️ Paused/i },
            { key: 'done',      title: '✅ Done',        match: /^## ✅ Done/i }
        ];

        async function loadKanban() {
            try {
                const resp = await fetch(CASA_PATH + '?t=' + Date.now());
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const text = await resp.text();
                renderKanban(text);
            } catch(e) {
                document.getElementById('board').innerHTML = '<div class="error-msg">Erro ao carregar Rotina Casa.md<br><span style="font-size:0.8rem;color:#444">' + e.message + '</span></div>';
            }
        }

        function renderKanban(text) {
            const lines = text.split('\n');
            const items = { backlog: [], 'in-progress': [], pending: [], paused: [], done: [] };
            let currentCol = null;

            for (let line of lines) {
                for (let col of COLUMNS) {
                    if (col.match.test(line)) { currentCol = col.key; break; }
                }
                if (!currentCol) continue;
                const match = line.match(/^-\s*(\[[ x]\])?\s*(.+)/);
                if (!match) continue;
                const checked = match[1] && match[1].includes('x');
                const content = match[2].replace(/<[^>]*>/g, '').trim();
                if (!content || content.startsWith('*')) continue;
                if (currentCol === 'done' || checked) items.done.push(content);
                else items[currentCol].push(content);
            }

            renderBoard(items);
            document.getElementById('lastUpdated').textContent = 'Atualizado: ' + new Date().toLocaleString('pt-BR');
        }

        function renderBoard(items) {
            const board = document.getElementById('board');
            board.innerHTML = COLUMNS.map(col => {
                const cards = items[col.key] || [];
                const cardsHtml = cards.length ? cards.map(c => `<div class="card">${c}</div>`).join('') : '<div class="empty-card">Nenhum item</div>';
                return `<div class="column" data-status="${col.key}"><div class="column-header"><span class="column-title">${col.title}</span><span class="column-count">${cards.length}</span></div>${cardsHtml}</div>`;
            }).join('');
        }

        loadKanban();
    </script>
</body>
</html>
