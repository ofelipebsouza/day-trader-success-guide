<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mindsun — Kanban</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; height: -webkit-fill-available; }

        :root {
            --bg: #0a0a0a;
            --surface: rgba(255,255,255,0.02);
            --surface-hover: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.05);
            --border-hover: rgba(255,255,255,0.1);
            --text: #d4d4d4;
            --text-muted: #777;
            --text-dim: #555;
            --text-bright: #fff;
            --accent: #888;
            --nav-h: 64px;
            --header-h: 64px;
            --safe-t: env(safe-area-inset-top, 0px);
            --safe-b: env(safe-area-inset-bottom, 0px);
            --safe-l: env(safe-area-inset-left, 0px);
            --safe-r: env(safe-area-inset-right, 0px);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            padding-top: calc(var(--safe-t) + 0px);
            padding-bottom: calc(var(--nav-h) + var(--safe-b));
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 16px; }
        @media (min-width: 768px) { .container { padding: 0 32px; } }

        /* ===== HEADER ===== */
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(10,10,10,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            padding-top: calc(12px + var(--safe-t));
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: var(--header-h);
        }
        .header h1 {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text-bright);
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header h1 i { color: var(--accent); font-size: 1.2rem; }
        .header h1 span { color: var(--text-dim); font-weight: 300; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .last-updated {
            font-size: 0.7rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .btn-icon {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 44px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .btn-icon:active { background: var(--surface-hover); transform: scale(0.96); }
        .btn-icon i { font-size: 1.1rem; }
        .btn-icon .label { display: none; }
        @media (min-width: 480px) { .btn-icon .label { display: inline; } }

        /* ===== STATS ===== */
        .stats-row {
            display: flex;
            gap: 8px;
            padding: 16px 16px 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .stats-row::-webkit-scrollbar { display: none; }
        .stat-box {
            flex: 0 0 auto;
            min-width: 80px;
            padding: 12px 16px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            text-align: center;
        }
        .stat-box .num { font-size: 1.4rem; font-weight: 800; color: var(--text-bright); }
        .stat-box .label {
            font-size: 0.6rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
        }
        .stat-box .label i { font-size: 0.7rem; }
        @media (min-width: 768px) {
            .stats-row {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 16px;
                padding: 24px 0 0;
                overflow: visible;
            }
            .stat-box { min-width: auto; padding: 16px; }
            .stat-box .num { font-size: 1.8rem; }
        }

        /* ===== BOARD ===== */
        .board-wrap {
            padding: 16px 0 16px 16px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .board-wrap::-webkit-scrollbar { display: none; }
        .board {
            display: flex;
            gap: 12px;
            min-width: min-content;
        }
        @media (min-width: 1100px) {
            .board-wrap {
                padding: 24px 0;
                overflow: visible;
            }
            .board {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 16px;
            }
        }

        .column {
            flex: 0 0 280px;
            scroll-snap-align: start;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 12px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, border-color 0.3s;
        }
        .column.drag-over { background: var(--surface-hover); border-color: var(--border-hover); }
        .column[data-status="backlog"] { border-left: 3px solid #555; }
        .column[data-status="in-progress"] { border-left: 3px solid #888; }
        .column[data-status="pending"] { border-left: 3px solid #444; border-style: dashed; }
        .column[data-status="paused"] { border-left: 3px solid #333; }
        .column[data-status="done"] { border-left: 3px solid #666; }
        @media (min-width: 1100px) {
            .column { flex: none; min-height: 120px; padding: 20px 16px; }
        }

        .column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .column-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-bright);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .column-title i { font-size: 0.9rem; color: var(--accent); }
        .column-count {
            font-size: 0.7rem;
            color: var(--text-dim);
            background: var(--surface);
            padding: 2px 10px;
            border-radius: 100px;
            font-weight: 600;
        }

        .card-list {
            flex: 1;
            overflow-y: auto;
            min-height: 60px;
        }
        .card-list:empty::after {
            content: 'Nenhum item';
            display: block;
            color: #333;
            font-size: 0.78rem;
            font-style: italic;
            text-align: center;
            padding: 20px 0;
        }

        .card {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.015);
            font-size: 0.82rem;
            line-height: 1.5;
            color: var(--text);
            transition: all 0.25s ease;
            cursor: grab;
            user-select: none;
            position: relative;
            touch-action: none;
            min-height: 48px;
            display: flex;
            align-items: center;
        }
        .card:last-child { margin-bottom: 0; }
        .card:active { background: var(--surface-hover); transform: scale(0.98); }
        .card.dragging { opacity: 0.4; }
        .column[data-status="done"] .card {
            opacity: 0.45;
            text-decoration: line-through;
            color: var(--text-dim);
        }

        .card .card-actions {
            position: absolute;
            top: 6px;
            right: 6px;
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .card:hover .card-actions,
        .card:focus-within .card-actions { opacity: 1; }
        .card .card-actions button {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.06);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 0.8rem;
        }
        .card .card-actions button:active { background: rgba(255,255,255,0.12); color: var(--text-bright); }

        /* Editing state */
        .card.editing {
            cursor: text;
            padding: 10px 12px;
            flex-direction: column;
            align-items: stretch;
        }
        .card.editing textarea {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-hover);
            color: var(--text-bright);
            border-radius: 8px;
            padding: 10px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            line-height: 1.5;
            resize: vertical;
            min-height: 70px;
            outline: none;
        }
        .card.editing textarea:focus { border-color: rgba(255,255,255,0.2); }
        .card.editing .edit-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .card.editing .edit-actions button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 44px;
        }
        .card.editing .edit-actions .save-btn { background: rgba(255,255,255,0.1); color: var(--text-bright); }
        .card.editing .edit-actions .save-btn:active { background: rgba(255,255,255,0.16); }
        .card.editing .edit-actions .cancel-btn { background: rgba(255,255,255,0.03); color: var(--text-dim); }

        /* Add button */
        .add-btn-wrap { margin-top: 12px; flex-shrink: 0; }
        .add-btn-wrap button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px dashed var(--border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 44px;
            transition: all 0.25s;
        }
        .add-btn-wrap button:active { background: var(--surface); color: var(--text-muted); border-color: var(--border-hover); }
        .add-btn-wrap button i { font-size: 1rem; }

        /* ===== BOTTOM NAV (mobile) ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            padding: 6px 0;
            padding-bottom: calc(6px + var(--safe-b));
            justify-content: space-around;
        }
        @media (min-width: 768px) { .bottom-nav { display: none; } }

        .bottom-nav a, .bottom-nav button {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 4px;
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.6rem;
            font-weight: 500;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: color 0.2s;
            min-height: 44px;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .bottom-nav a i, .bottom-nav button i {
            font-size: 1.3rem;
            transition: color 0.2s;
        }
        .bottom-nav a.active, .bottom-nav a:active,
        .bottom-nav button.active, .bottom-nav button:active { color: var(--text-bright); }
        .bottom-nav a.active i, .bottom-nav button.active i { color: var(--accent); }

        /* Desktop nav tabs */
        .desktop-tabs {
            display: none;
            gap: 6px;
            padding: 0;
            margin-bottom: 0;
            flex-wrap: wrap;
        }
        @media (min-width: 768px) {
            .desktop-tabs { display: flex; padding: 20px 0 0; }
        }
        .desktop-tabs a, .desktop-tabs button {
            padding: 10px 18px;
            border-radius: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            transition: all 0.25s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Inter', sans-serif;
            min-height: 44px;
        }
        .desktop-tabs a:hover, .desktop-tabs button:hover { background: var(--surface-hover); color: var(--text); }
        .desktop-tabs a.active, .desktop-tabs button.active { background: rgba(255,255,255,0.08); color: var(--text-bright); border-color: var(--border-hover); }
        .desktop-tabs a i, .desktop-tabs button i { font-size: 1rem; }

        /* ===== GRAPH ===== */
        .graph-view { width: 100%; height: calc(100vh - 200px); min-height: 400px; position: relative; padding: 0 16px; }
        .graph-view canvas { width: 100%; height: 100%; border-radius: 16px; background: var(--surface); border: 1px solid var(--border); }
        .graph-legend { display: flex; gap: 12px; margin-top: 16px; justify-content: center; flex-wrap: wrap; padding: 0 16px 24px; }
        .graph-legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-muted); }
        .graph-legend-item .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

        /* ===== SAVE BAR ===== */
        .save-bar {
            position: fixed;
            bottom: var(--nav-h);
            left: 0;
            right: 0;
            z-index: 99;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--border);
            padding: 10px 16px;
            padding-bottom: calc(10px + var(--safe-b));
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .save-bar.show {
            display: flex;
            transform: translateY(0);
        }
        @media (min-width: 768px) {
            .save-bar { bottom: 0; }
        }
        .save-bar .info {
            font-size: 0.78rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
        }
        .save-bar .info i { font-size: 0.9rem; }
        .save-bar .actions { display: flex; gap: 8px; flex-shrink: 0; }
        .save-bar .actions button {
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 44px;
            white-space: nowrap;
        }
        .save-bar .actions .save-btn { background: rgba(255,255,255,0.1); color: var(--text-bright); }
        .save-bar .actions .save-btn:active { background: rgba(255,255,255,0.16); }
        .save-bar .actions .discard-btn { background: rgba(255,255,255,0.03); color: var(--text-dim); }
        .save-bar .actions .discard-btn:active { color: var(--text-muted); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .error-msg {
            color: var(--text-dim);
            text-align: center;
            padding: 80px 16px;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .error-msg i { font-size: 2rem; color: #333; }

        /* Scroll indicators */
        .scroll-hint {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            font-size: 0.72rem;
            color: var(--text-dim);
            opacity: 0.6;
        }
        .scroll-hint i { font-size: 0.9rem; animation: scrollPulse 2s ease-in-out infinite; }
        @keyframes scrollPulse { 0%,100% { transform: translateX(0); } 50% { transform: translateX(4px); } }
        @media (min-width: 1100px) { .scroll-hint { display: none; } }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
        :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <h1><i class="ph ph-kanban"></i> MINDSUN<span>.</span> <span style="font-weight:400;font-size:0.9rem">Kanban</span></h1>
        <div class="header-right">
            <span class="last-updated" id="lastUpdated"><i class="ph ph-clock"></i> <span class="label">—</span></span>
            <button class="btn-icon" onclick="loadKanban()" aria-label="Atualizar"><i class="ph ph-arrows-clockwise"></i></button>
        </div>
    </header>

    <div class="container">
        <!-- DESKTOP TABS -->
        <div class="desktop-tabs">
            <a href="index.html" class="active" data-view="kanban"><i class="ph ph-kanban"></i> Projetos</a>
            <a href="pessoal.html" data-view="pessoal"><i class="ph ph-user"></i> Pessoal</a>
            <a href="casa.html" data-view="casa"><i class="ph ph-house"></i> Casa</a>
            <button onclick="switchView('graph')" data-view="graph"><i class="ph ph-graph"></i> Grafo</button>
        </div>

        <!-- STATS -->
        <div class="stats-row" id="statsRow"></div>

        <!-- KANBAN VIEW -->
        <div id="viewKanban" class="tab-content active">
            <div class="scroll-hint" id="scrollHint"><i class="ph ph-caret-right"></i> Arraste para o lado</div>
            <div class="board-wrap">
                <div class="board" id="board"></div>
            </div>
        </div>

        <!-- GRAPH VIEW -->
        <div id="viewGraph" class="tab-content">
            <div class="graph-view"><canvas id="graphCanvas"></canvas></div>
            <div class="graph-legend" id="graphLegend"></div>
        </div>
    </div>

    <!-- SAVE BAR -->
    <div class="save-bar" id="saveBar">
        <div class="info"><i class="ph ph-pencil-simple"></i> <span id="saveInfo">Alterações não salvas</span></div>
        <div class="actions">
            <button class="discard-btn" onclick="discardChanges()" aria-label="Descartar"><i class="ph ph-x"></i></button>
            <button class="save-btn" onclick="saveChanges()" aria-label="Salvar"><i class="ph ph-check"></i> Salvar</button>
        </div>
    </div>

    <!-- BOTTOM NAV (mobile) -->
    <nav class="bottom-nav" id="bottomNav" role="tablist">
        <a href="index.html" class="active" data-view="kanban"><i class="ph ph-kanban"></i> Projetos</a>
        <a href="pessoal.html" data-view="pessoal"><i class="ph ph-user"></i> Pessoal</a>
        <a href="casa.html" data-view="casa"><i class="ph ph-house"></i> Casa</a>
        <button onclick="switchView('graph')" data-view="graph"><i class="ph ph-graph"></i> Grafo</button>
    </nav>

    <script>
        const KANBAN_PATH = 'Kanban.md';
        let originalText = '';
        let hasChanges = false;
        let currentView = 'kanban';

        const COLUMNS = [
            { key: 'backlog',   title: '📋 Backlog',     icon: 'ph ph-tray',           match: /^##\s*📋 Backlog/i },
            { key: 'in-progress', title: '🔄 In Progress', icon: 'ph ph-circle',        match: /^##\s*🔄 In Progress/i },
            { key: 'pending',   title: '⏸️ Pending',     icon: 'ph ph-hourglass',       match: /^##\s*⏸️ Pending/i },
            { key: 'paused',    title: '⏹️ Paused',      icon: 'ph ph-pause-circle',    match: /^##\s*⏹️ Paused/i },
            { key: 'done',      title: '✅ Done',        icon: 'ph ph-check-circle',    match: /^##\s*✅ Done/i }
        ];

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('viewKanban').classList.toggle('active', view === 'kanban');
            document.getElementById('viewGraph').classList.toggle('active', view === 'graph');

            // Update active states on both nav bars
            document.querySelectorAll('.desktop-tabs a,.desktop-tabs button,.bottom-nav a,.bottom-nav button').forEach(el => {
                el.classList.toggle('active', el.dataset.view === view);
            });

            if (view === 'graph') setTimeout(renderGraph, 100);
        }

        async function loadKanban() {
            try {
                const resp = await fetch(KANBAN_PATH + '?t=' + Date.now());
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const text = await resp.text();
                originalText = text;
                hasChanges = false;
                document.getElementById('saveBar').classList.remove('show');
                renderKanban(text);
                const now = new Date().toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
                document.querySelector('#lastUpdated .label').textContent = now;
            } catch(e) {
                document.getElementById('board').innerHTML =
                    '<div class="error-msg"><i class="ph ph-warning-circle"></i> Erro ao carregar<br><span style="font-size:0.8rem;color:#444">' + e.message + '</span></div>';
            }
        }

        function renderKanban(text) {
            const lines = text.split('\n');
            const items = { backlog: [], 'in-progress': [], pending: [], paused: [], done: [] };
            let currentCol = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                for (let col of COLUMNS) {
                    if (col.match.test(line)) { currentCol = col.key; break; }
                }
                if (!currentCol) continue;
                const match = line.match(/^-\s*(\[[ x]\])?\s*(.+)/);
                if (!match) continue;
                const checked = match[1] && match[1].includes('x');
                const content = match[2].replace(/<[^>]*>/g, '').trim();
                if (!content || content.startsWith('*')) continue;
                if (currentCol === 'done' || checked) {
                    items.done.push({ id: 'done-' + items.done.length, content });
                } else {
                    items[currentCol].push({ id: currentCol + '-' + items[currentCol].length, content });
                }
            }

            renderStats(items);
            renderBoard(items);
            // Hide scroll hint on desktop
            if (window.innerWidth >= 1100) document.getElementById('scrollHint').style.display = 'none';
        }

        function renderStats(items) {
            const total = Object.values(items).reduce((a, b) => a + b.length, 0);
            const doneCount = items.done.length;
            const progress = total > 0 ? Math.round((doneCount / total) * 100) : 0;
            document.getElementById('statsRow').innerHTML = `
                <div class="stat-box"><div class="num">${progress}%</div><div class="label"><i class="ph ph-gauge"></i> Concluído</div></div>
                <div class="stat-box"><div class="num">${total}</div><div class="label"><i class="ph ph-list-bullets"></i> Total</div></div>
                <div class="stat-box"><div class="num">${items.backlog.length}</div><div class="label"><i class="ph ph-tray"></i> Backlog</div></div>
                <div class="stat-box"><div class="num">${items['in-progress'].length}</div><div class="label"><i class="ph ph-circle"></i> Andamento</div></div>
                <div class="stat-box"><div class="num">${doneCount}</div><div class="label"><i class="ph ph-check-circle"></i> Concluídos</div></div>
            `;
        }

        function renderBoard(items) {
            const board = document.getElementById('board');
            board.innerHTML = COLUMNS.map(col => {
                const cards = items[col.key] || [];
                const cardsHtml = cards.length ? cards.map(c => `
                    <div class="card" draggable="true" data-id="${c.id}" data-content="${c.content.replace(/"/g,'&quot;')}"
                         ondragstart="dragStart(event)" ondragend="dragEnd(event)"
                         ondblclick="editCard(this)" ontouchstart="onTouchStart(event)"
                         role="listitem" tabindex="0">
                        <span>${c.content}</span>
                        <span class="card-actions">
                            <button onclick="editCard(this.closest('.card'))" aria-label="Editar"><i class="ph ph-pencil-simple"></i></button>
                            <button onclick="deleteCard(this.closest('.card'))" aria-label="Excluir"><i class="ph ph-trash"></i></button>
                        </span>
                    </div>`).join('') : '';
                return `
                    <div class="column" data-status="${col.key}"
                         ondragover="dragOver(event)" ondrop="drop(event)" ondragleave="dragLeave(event)">
                        <div class="column-header">
                            <span class="column-title"><i class="${col.icon}"></i> ${col.title}</span>
                            <span class="column-count">${cards.length || '0'}</span>
                        </div>
                        <div class="card-list" role="list">${cardsHtml}</div>
                        <div class="add-btn-wrap"><button onclick="addCard('${col.key}')"><i class="ph ph-plus"></i> Adicionar</button></div>
                    </div>`;
            }).join('');
        }

        // === DRAG & DROP ===
        let draggedCard = null;
        function dragStart(e) {
            draggedCard = e.target.closest('.card');
            if (!draggedCard) return;
            draggedCard.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', draggedCard.dataset.id);
        }
        function dragEnd(e) {
            if (draggedCard) draggedCard.classList.remove('dragging');
            document.querySelectorAll('.column.drag-over').forEach(c => c.classList.remove('drag-over'));
        }
        function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('drag-over'); }
        function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        function drop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const col = e.currentTarget;
            const card = draggedCard;
            if (!card || !col) return;
            const content = card.dataset.content;
            card.remove();
            const list = col.querySelector('.card-list');
            const newCard = createCardElement(content);
            list.appendChild(newCard);
            updateColumnCounts();
            markChanged();
        }

        let touchCard = null;
        function onTouchStart(e) {
            touchCard = e.currentTarget;
            // Long press could trigger edit, but for now just track
        }

        function createCardElement(content) {
            const div = document.createElement('div');
            div.className = 'card';
            div.draggable = true;
            div.dataset.content = content;
            div.dataset.id = 'card-' + Date.now();
            div.innerHTML = `<span>${content}</span><span class="card-actions"><button onclick="editCard(this.closest('.card'))" aria-label="Editar"><i class="ph ph-pencil-simple"></i></button><button onclick="deleteCard(this.closest('.card'))" aria-label="Excluir"><i class="ph ph-trash"></i></button></span>`;
            div.ondragstart = dragStart;
            div.ondragend = dragEnd;
            div.ondblclick = () => editCard(div);
            div.setAttribute('tabindex', '0');
            div.setAttribute('role', 'listitem');
            return div;
        }

        function updateColumnCounts() {
            document.querySelectorAll('.column').forEach(col => {
                const count = col.querySelector('.column-count');
                const cards = col.querySelectorAll('.card-list > .card:not(.editing)');
                if (count) count.textContent = cards.length;
            });
        }

        // === EDITING ===
        function editCard(cardEl) {
            if (cardEl.classList.contains('editing')) return;
            const content = cardEl.dataset.content;
            cardEl.classList.add('editing');
            cardEl.draggable = false;
            cardEl.innerHTML = `
                <textarea class="edit-textarea">${content}</textarea>
                <div class="edit-actions">
                    <button class="save-btn" onclick="saveEdit(this.closest('.card'))"><i class="ph ph-check"></i> Salvar</button>
                    <button class="cancel-btn" onclick="cancelEdit(this.closest('.card'), '${content.replace(/'/g,"\\'")}')"><i class="ph ph-x"></i> Cancelar</button>
                </div>`;
            cardEl.querySelector('textarea').focus();
        }

        function saveEdit(cardEl) {
            const textarea = cardEl.querySelector('.edit-textarea');
            const newContent = textarea.value.trim();
            if (!newContent) { cardEl.remove(); updateColumnCounts(); markChanged(); return; }
            cardEl.dataset.content = newContent;
            cardEl.className = 'card';
            cardEl.draggable = true;
            cardEl.innerHTML = `<span>${newContent}</span><span class="card-actions"><button onclick="editCard(this.closest('.card'))" aria-label="Editar"><i class="ph ph-pencil-simple"></i></button><button onclick="deleteCard(this.closest('.card'))" aria-label="Excluir"><i class="ph ph-trash"></i></button></span>`;
            cardEl.ondragstart = dragStart;
            cardEl.ondragend = dragEnd;
            cardEl.ondblclick = () => editCard(cardEl);
            cardEl.setAttribute('tabindex', '0');
            markChanged();
        }

        function cancelEdit(cardEl, oldContent) {
            cardEl.className = 'card';
            cardEl.draggable = true;
            cardEl.dataset.content = oldContent;
            cardEl.innerHTML = `<span>${oldContent}</span><span class="card-actions"><button onclick="editCard(this.closest('.card'))" aria-label="Editar"><i class="ph ph-pencil-simple"></i></button><button onclick="deleteCard(this.closest('.card'))" aria-label="Excluir"><i class="ph ph-trash"></i></button></span>`;
            cardEl.ondragstart = dragStart;
            cardEl.ondragend = dragEnd;
            cardEl.ondblclick = () => editCard(cardEl);
            cardEl.setAttribute('tabindex', '0');
        }

        function deleteCard(cardEl) {
            if (!confirm('Excluir esta tarefa?')) return;
            cardEl.remove();
            updateColumnCounts();
            markChanged();
        }

        function addCard(status) {
            const list = document.querySelector(`.column[data-status="${status}"] .card-list`);
            if (!list) return;
            const div = createCardElement('Nova tarefa...');
            list.appendChild(div);
            updateColumnCounts();
            editCard(div);
        }

        function markChanged() {
            hasChanges = true;
            document.getElementById('saveBar').classList.add('show');
        }

        // === SAVE / DISCARD ===
        function saveChanges() {
            let md = '---\n\nkanban-plugin: board\n\n---\n';
            document.querySelectorAll('.column').forEach(col => {
                const status = col.dataset.status;
                const colDef = COLUMNS.find(c => c.key === status);
                if (!colDef) return;
                md += `\n${colDef.title}\n\n`;
                const cards = col.querySelectorAll('.card-list > .card');
                if (cards.length === 0) md += '- [ ] *Nenhum item*\n\n';
                else {
                    cards.forEach(card => {
                        md += `- [${status === 'done' ? 'x' : ' '}] ${card.dataset.content}\n`;
                    });
                    md += '\n';
                }
            });
            md += '%% kanban:settings\n```\n{"kanban-plugin":"board","list-collapse":[]}\n```\n%%\n';

            const blob = new Blob([md], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'Kanban.md'; a.click();
            URL.revokeObjectURL(url);
            hasChanges = false;
            document.getElementById('saveBar').classList.remove('show');
            document.getElementById('saveInfo').textContent = '✅ Baixado! Substitua o Kanban.md no Brain';
            setTimeout(() => { document.getElementById('saveInfo').textContent = 'Alterações não salvas'; }, 3000);
        }

        function discardChanges() {
            if (!confirm('Descartar alterações?')) return;
            hasChanges = false;
            document.getElementById('saveBar').classList.remove('show');
            loadKanban();
        }

        // === GRAPH ===
        function renderGraph() {
            const canvas = document.getElementById('graphCanvas');
            const ctx = canvas.getContext('2d');
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width || 1200;
            canvas.height = rect.height || 500;
            const cx = canvas.width / 2, cy = canvas.height / 2;

            const lines = originalText.split('\n');
            const items = { backlog: [], 'in-progress': [], pending: [], paused: [], done: [] };
            let currentCol = null;
            for (let line of lines) {
                for (let col of COLUMNS) { if (col.match.test(line)) { currentCol = col.key; break; } }
                if (!currentCol) continue;
                const m = line.match(/^-\s*(\[[ x]\])?\s*(.+)/);
                if (!m) continue;
                const c = m[2].replace(/<[^>]*>/g, '').trim();
                if (!c || c.startsWith('*')) continue;
                if (currentCol === 'done' || (m[1] && m[1].includes('x'))) items.done.push(c);
                else items[currentCol].push(c);
            }

            const colors = { backlog: '#555', 'in-progress': '#888', pending: '#444', paused: '#333', done: '#666' };
            let nid = 0;
            const colNodes = COLUMNS.map((col, i) => {
                const a = (i / COLUMNS.length) * 2 * Math.PI - Math.PI / 2;
                const r = Math.min(cx, cy) * 0.5;
                return { id: nid++, label: col.title, type: 'column', color: colors[col.key], x: cx + r * Math.cos(a), y: cy + r * Math.sin(a), vx: 0, vy: 0, r: 16 };
            });
            const allNodes = [...colNodes];
            COLUMNS.forEach((col, ci) => {
                (items[col.key] || []).forEach((content, i) => {
                    const label = content.length > 25 ? content.slice(0, 22) + '...' : content;
                    allNodes.push({ id: nid++, label, type: 'card', colIdx: ci, color: colors[col.key], x: 0, y: 0, vx: 0, vy: 0, r: 6 });
                });
            });

            const cardNodes = allNodes.filter(n => n.type === 'card');
            // Position near columns
            cardNodes.forEach((n, i) => {
                const cn = colNodes[n.colIdx];
                const a = Math.random() * 2 * Math.PI;
                const d = 35 + (i % 7) * 18;
                n.x = cn.x + d * Math.cos(a);
                n.y = cn.y + d * Math.sin(a);
            });

            // Simple layout
            for (let iter = 0; iter < 30; iter++) {
                for (let i = 0; i < allNodes.length; i++) {
                    for (let j = i + 1; j < allNodes.length; j++) {
                        let dx = allNodes[j].x - allNodes[i].x, dy = allNodes[j].y - allNodes[i].y;
                        let d = Math.sqrt(dx * dx + dy * dy) || 1;
                        let f = 300 / (d * d);
                        allNodes[i].vx -= f * dx / d; allNodes[i].vy -= f * dy / d;
                        allNodes[j].vx += f * dx / d; allNodes[j].vy += f * dy / d;
                    }
                }
                cardNodes.forEach(n => {
                    const cn = colNodes[n.colIdx];
                    let dx = cn.x - n.x, dy = cn.y - n.y;
                    let d = Math.sqrt(dx * dx + dy * dy) || 1;
                    n.vx += dx * 0.008; n.vy += dy * 0.008;
                });
                allNodes.forEach(n => { n.x += n.vx; n.y += n.vy; n.vx *= 0.85; n.vy *= 0.85; n.x = Math.max(10, Math.min(canvas.width-10, n.x)); n.y = Math.max(10, Math.min(canvas.height-10, n.y)); });
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
            cardNodes.forEach(n => {
                const cn = colNodes[n.colIdx];
                ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(cn.x, cn.y); ctx.stroke();
            });
            allNodes.forEach(n => {
                ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, 2 * Math.PI);
                ctx.fillStyle = n.color; ctx.globalAlpha = n.type === 'column' ? 0.8 : 0.45; ctx.fill();
                ctx.globalAlpha = 1; ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 0.5; ctx.stroke();
                ctx.fillStyle = n.type === 'column' ? '#fff' : '#aaa';
                ctx.font = n.type === 'column' ? 'bold 10px Inter' : '9px Inter';
                ctx.textAlign = 'center';
                ctx.textBaseline = n.type === 'column' ? 'bottom' : 'top';
                ctx.fillText(n.label, n.x, n.type === 'column' ? n.y - n.r - 3 : n.y + n.r + 3);
            });

            document.getElementById('graphLegend').innerHTML = COLUMNS.map(col =>
                `<span class="graph-legend-item"><span class="dot" style="background:${colors[col.key]}"></span> ${col.title}</span>`
            ).join('');
        }

        window.addEventListener('resize', () => {
            if (document.getElementById('viewGraph').classList.contains('active')) renderGraph();
        });

        // Sync bottom nav active state on page load
        document.querySelectorAll('.bottom-nav a').forEach(a => {
            if (a.href && a.href === window.location.href) a.classList.add('active');
        });

        loadKanban();
    </script>
</body>
</html>
