<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Day Trader Success — Full Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --card: #0f1217; --border: #1c2330; --text: #e2e6ed; --text2: #8891a4; --text3: #4d5665;
    --green: #22c55e; --green-bg: rgba(34,197,94,.12); --red: #ef4444; --blue: #3b82f6; --gold: #f59e0b; --cyan: #06b6d4; --purple: #a855f7;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;touch-action:pan-y}
  
  /* ===== FULLSCREEN CHART VIEW ===== */
  .screen{
    display:flex;flex-direction:column;
    width:100vw;height:100vh;height:100dvh;
    background:var(--bg);
    position:relative;overflow:hidden;
  }

  /* TOP BAR */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px 6px;z-index:10;flex-shrink:0;
  }
  .topbar .pair{
    font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--cyan);
    display:flex;align-items:center;gap:8px;
  }
  .topbar .pair .badge{
    font-size:9px;padding:2px 8px;border-radius:4px;font-weight:600;
    background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.15);color:var(--cyan);
  }
  .topbar .nav{
    display:flex;gap:10px;align-items:center;
  }
  .topbar .nav .counter{
    font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;
  }
  .topbar .nav button{
    width:36px;height:36px;border-radius:10px;border:1px solid var(--border);
    background:var(--card);color:var(--text);font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .topbar .nav button:active{background:var(--border)}

  /* RESULT BANNER */
  .result-banner{
    display:flex;align-items:center;gap:10px;
    padding:6px 14px;margin:0 14px 6px;border-radius:10px;
    background:var(--green-bg);border:1px solid rgba(34,197,94,.2);flex-shrink:0;
  }
  .result-banner .icon{font-size:18px}
  .result-banner .info{flex:1}
  .result-banner .info .val{font-size:18px;font-weight:800;color:var(--green);font-family:'JetBrains Mono',monospace}
  .result-banner .info .sub{font-size:10px;color:var(--text2)}
  .result-banner .tags{display:flex;gap:4px;flex-shrink:0}
  .result-banner .tags .tg{
    padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;
  }
  .tg5s{background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3);color:var(--purple)}
  .tg10s{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:var(--blue)}
  .tg30s{background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.3);color:var(--orange)}
  .tg1m{background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.3);color:var(--cyan)}
  .tg2m{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.15);color:var(--gold)}
  .tgcall{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.2);color:var(--green)}
  .tgput{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.2);color:var(--red)}
  .tgpct{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--text2)}

  /* ===== CHART AREA (fills most of screen) ===== */
  .chart-area{
    flex:1;position:relative;overflow:hidden;
    margin:4px 10px 0;border-radius:14px;
    background:var(--card);border:1px solid var(--border);
    min-height:0;
  }
  .chart-area canvas{
    position:absolute;inset:0;
    width:100% !important;height:100% !important;
  }

  /* BOTTOM INFO */
  .bottom-info{
    display:flex;gap:8px;padding:6px 14px 12px;
    flex-shrink:0;overflow-x:auto;scrollbar-width:none;
  }
  .bottom-info::-webkit-scrollbar{display:none}
  .bi{
    flex-shrink:0;padding:6px 10px;border-radius:8px;
    background:var(--card);border:1px solid var(--border);
    font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;
    display:flex;flex-direction:column;gap:1px;
  }
  .bi .k{font-size:8px;text-transform:uppercase;letter-spacing:.3px;color:var(--text3);opacity:.6}
  .bi .v{font-size:12px;font-weight:600;color:var(--text)}
  .bi .v.g{color:var(--green)}
  .bi .v.b{color:var(--blue)}
  .bi .v.gold{color:var(--gold)}

  /* SWIPE INDICATOR */
  .swipe-hint{
    text-align:center;padding:2px 0 4px;flex-shrink:0;
    font-size:10px;color:var(--text3);opacity:.5;
    letter-spacing:.5px;
  }

  /* FILTER BAR */
  .filter-bar{
    display:flex;gap:4px;padding:4px 10px 0;
    overflow-x:auto;scrollbar-width:none;flex-shrink:0;
  }
  .filter-bar::-webkit-scrollbar{display:none}
  .fb{
    flex-shrink:0;padding:4px 12px;border-radius:6px;
    border:1px solid var(--border);background:var(--card);
    color:var(--text3);font-size:10px;font-weight:600;cursor:pointer;
    transition:.15s;font-family:Inter,sans-serif;white-space:nowrap;
  }
  .fb:active,.fb.active{background:var(--green-bg);border-color:rgba(34,197,94,.3);color:var(--green)}
  .fb.all{background:var(--green-bg);border-color:rgba(34,197,94,.2);color:var(--green)}

  /* LIST VIEW TOGGLE */
  .list-toggle{
    position:fixed;bottom:70px;right:14px;z-index:100;
    width:44px;height:44px;border-radius:50%;
    background:var(--card);border:1px solid var(--border);
    color:var(--text2);font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 16px rgba(0,0,0,.5);backdrop-filter:blur(8px);
    transition:.15s;
  }
  .list-toggle:active{background:var(--border)}
</style>
</head>

      <div class="bi"><span class="k">Horário Gráfico</span><span class="v b">${t.time}</span></div>
      <div class="bi"><span class="k">iPhone</span><span class="v gold">${t.iphone}</span></div>
      <div class="bi"><span class="k">${t.sup?"Suporte":"Resistência"}</span><span class="v b">${t.sup||t.res||"—"}</span></div>
      <div class="bi"><span class="k">Imagens</span><span class="v">img ${t.img}</span></div>
    </div>

    <div class="swipe-hint">← Deslize para navegar →</div>
  </div>`;

  document.getElementById('app').innerHTML = html;
  drawChart(t);

  // Touch swipe
  let startX = 0;
  document.querySelector('.screen').addEventListener('touchstart', e => startX = e.touches[0].clientX);
  document.querySelector('.screen').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    if(Math.abs(dx) > 60) dx > 0 ? prev() : next();
  });
  document.querySelector('.screen').addEventListener('wheel', e => {
    if(Math.abs(e.deltaX) > 30) e.deltaX > 0 ? next() : prev();
  });
  // Keyboard
  document.onkeydown = e => { if(e.key==='ArrowRight') next(); if(e.key==='ArrowLeft') prev(); };
}

function drawChart(t) {
  const canvas = document.getElementById('cv');
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;

  const padL = 8, padR = 48, padT = 20, padB = 28;
  const cw = W - padL - padR;
  const ch = H - padT - padB;

  // Background
  ctx.fillStyle = '#0f1217';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  const gridLines = 5;
  ctx.strokeStyle = 'rgba(255,255,255,.04)';
  ctx.lineWidth = 0.5;
  for(let i=0;i<=gridLines;i++){
    const y = padT + (ch/gridLines)*i;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W-padR, y); ctx.stroke();
  }
  // Vertical grid
  for(let i=1;i<8;i++){
    const x = padL + (cw/8)*i;
    ctx.beginPath(); ctx.moveTo(x, padT); ctx.lineTo(x, H-padB); ctx.stroke();
  }

  // Price labels (right side)
  ctx.fillStyle = '#4d5665';
  ctx.font = '9px JetBrains Mono, monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for(let i=0;i<5;i++){
    const y = padT + (ch/4)*i;
    ctx.fillText(t.prices[i].toFixed(t.prices[i]<1?5:t.prices[i]>10?3:t.prices[i]>1?4:5), W-6, y);
  }

  // Time labels (bottom)
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#4d5665';
  for(let i=0;i<5;i++){
    const x = padL + (cw/4)*i;
    ctx.fillText(t.times[i], x, H-padB+6);
  }

  // Support/resistance line
  if(t.sup || t.res){
    const level = t.sup || t.res;
    const priceRange = t.prices[0] - t.prices[4];
    const yRatio = (t.prices[0] - level) / priceRange;
    const sy = padT + ch * yRatio;
    ctx.strokeStyle = t.sup ? 'rgba(59,130,246,.5)' : 'rgba(249,115,22,.5)';
    ctx.setLineDash([6,4]);
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(padL, sy); ctx.lineTo(W-padR, sy); ctx.stroke();
    ctx.setLineDash([]);
    // Label
    ctx.fillStyle = t.sup ? 'rgba(59,130,246,.8)' : 'rgba(249,115,22,.8)';
    ctx.font = '8px JetBrains Mono, monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    const label = t.sup ? 'Suporte ' : 'Resistência ';
    ctx.fillText(label + level, padL+4, sy-2);
  }

  // Entry line
  const entryIdx = t.prices.findIndex(p => {
    if(t.entry >= 1) return Math.abs(p - t.entry) < 0.05;
    return Math.abs(p - t.entry) < 0.0005;
  });
  let priceRange = t.prices[0] - t.prices[4];
  const entryRatio = (t.prices[0] - t.entry) / priceRange;
  const ey = padT + ch * Math.max(0, Math.min(1, entryRatio));

  ctx.strokeStyle = t.dir === 'PUT' ? 'rgba(239,68,68,.7)' : 'rgba(34,197,94,.7)';
  ctx.setLineDash([8,4]);
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(padL, ey); ctx.lineTo(W-padR, ey); ctx.stroke();
  ctx.setLineDash([]);

  // Entry label on right
  ctx.fillStyle = t.dir === 'PUT' ? '#ef4444' : '#22c55e';
  ctx.font = 'bold 9px JetBrains Mono, monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('ENTRADA ' + t.entry, W-6, ey-2);
  // Arrow indicator
  ctx.fillStyle = t.dir === 'PUT' ? '#ef4444' : '#22c55e';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(t.dir==='PUT'?'▼':'▲', W-38, ey + (t.dir==='PUT'?14:-2));

  // Draw candles using REAL prices
  const candles = t.candles;
  const nC = candles.length;
  const candleW = Math.min((cw-10)/nC - 2, 16);
  const gap = (cw-10 - candleW*nC) / (nC-1) + candleW;
  const priceMax = Math.max(...t.candles.map(c=>c.h), t.prices[0]);
  const priceMin = Math.min(...t.candles.map(c=>c.l), t.prices[4]);
  priceRange = Math.max(priceMax - priceMin, 0.0001);

  function priceToY(p) { return padT + (priceMax - p) / priceRange * ch; }

  for(let i=0;i<nC;i++){
    const c = candles[i];
    const isBull = c.c >= c.o;

    const oY = priceToY(c.o);
    const cY = priceToY(c.c);
    const hY = priceToY(c.h);
    const lY = priceToY(c.l);

    const x = padL + 5 + i * gap;
    const bodyTop = Math.min(oY, cY);
    const bodyBot = Math.max(oY, cY);
    const bodyH = Math.max(bodyBot - bodyTop, 2);
    const midX = x + candleW/2;

    // Wick color
    ctx.strokeStyle = isBull ? 'rgba(34,197,94,.6)' : 'rgba(239,68,68,.6)';
    ctx.lineWidth = 1.2;
    
    // Upper wick
    const wickTop = Math.min(hY, oY, cY);
    ctx.beginPath();
    ctx.moveTo(midX, bodyTop);
    ctx.lineTo(midX, wickTop);
    ctx.stroke();

    // Lower wick
    const wickBot = Math.max(lY, oY, cY);
    ctx.beginPath();
    ctx.moveTo(midX, bodyBot);
    ctx.lineTo(midX, wickBot);
    ctx.stroke();

    // Body
    ctx.fillStyle = isBull ? '#22c55e' : '#ef4444';
    ctx.shadowColor = isBull ? 'rgba(34,197,94,.25)' : 'rgba(239,68,68,.15)';
    ctx.shadowBlur = isBull ? 4 : 2;
    const r = Math.min(2, bodyH/2);
    ctx.beginPath();
    ctx.roundRect(x, bodyTop, candleW, bodyH, r);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Annotations
  if(t.ann){
    for(const a of t.ann){
      const ax = padL + 5 + a.x * cw;
      const ay = padT + a.y * ch;
      const colors = {green:'rgba(34,197,94,.15)',red:'rgba(239,68,68,.15)',blue:'rgba(59,130,246,.15)',gold:'rgba(234,179,8,.15)',orange:'rgba(249,115,22,.15)',purple:'rgba(168,85,247,.15)',cyan:'rgba(6,182,212,.15)'};
      const borders = {green:'rgba(34,197,94,.3)',red:'rgba(239,68,68,.3)',blue:'rgba(59,130,246,.3)',gold:'rgba(234,179,8,.3)',orange:'rgba(249,115,22,.3)',purple:'rgba(168,85,247,.3)',cyan:'rgba(6,182,212,.3)'};
      const texts = {green:'#22c55e',red:'#ef4444',blue:'#3b82f6',gold:'#f59e0b',orange:'#f97316',purple:'#a855f7',cyan:'#06b6d4'};
      ctx.fillStyle = colors[a.c] || colors.green;
      ctx.strokeStyle = borders[a.c] || borders.green;
      ctx.lineWidth = 1;
      ctx.beginPath();
      const tw = ctx.measureText(a.t).width + 16;
      ctx.roundRect(ax - tw/2, ay - 9, tw, 18, 5);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = texts[a.c] || '#22c55e';
      ctx.font = 'bold 9px JetBrains Mono, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(a.t, ax, ay+1);
    }
  }

  // Watermark
  ctx.fillStyle = 'rgba(255,255,255,.015)';
  ctx.font = 'bold 32px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(t.pair.split(' ')[0], W/2, H/2);
}

function prev(){ if(currentIdx>0) render(currentIdx-1); }
function next(){ if(currentIdx<filtered.length-1) render(currentIdx+1); }

// ====== INIT ======
render(0);
</script>
</body>
